name: twilio-call
version: 0.1.0
description: Place an outbound TTS voice call via Twilio (Polly voice).
entrypoint: twilio-call.sh
usage: "twilio-call.sh <to_number> \"<message>\""
triggers: ["call via twilio", "automated voice call"]
requirements: {bins: [python3], env_file: ~/.fable/twilio.env}
permissions: [network]
interactive: false
